<div id="scroll-wrap">

<header class="site-header">

    <div class="brand-icon">

</header>

<div class="catalog-meta">

<div class="filter-bar">
  <input type="text" id="search-input" class="search-input" placeholder="SEARCH BY NAME...">
  <select id="sort-select" class="sort-select">
    <option value="newest">&#11015; NEWEST FIRST</option>
    <option value="oldest">&#11014; OLDEST FIRST</option>
    <option value="price-asc">$ LOW &#8594; HIGH</option>
    <option value="price-desc">$ HIGH &#8594; LOW</option>
    <option value="name">A &#8594; Z</option>
  </select>
</div>

<div class="catalog" id="catalog"></div>

  Internal pricing reference · Staff only<br>

</div><!-- /#scroll-wrap -->

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="Product photo">
</div>

<script>
/* ═══════════════════════════════════════════════════
   RENDER ENGINE — builds cards from PRODUCTS array
   ═══════════════════════════════════════════════════ */
(function() {

  var $ = function(id) { return document.getElementById(id); };
  var fmt = function(n) { return '$' + Number(n).toFixed(2); };

  /* ── FILTER + SORT ──────────────────────────── */
  function getProducts() {
    var query = ($('search-input').value || '').trim().toLowerCase();
    var sort  = $('sort-select').value;

    var result = PRODUCTS.filter(function(p) {
      return !query || p.name.toLowerCase().indexOf(query) !== -1;
    });

    if (sort === 'oldest')     result = result.slice().reverse();
    if (sort === 'price-asc')  result = result.slice().sort(function(a,b){ return a.sell - b.sell; });
    if (sort === 'price-desc') result = result.slice().sort(function(a,b){ return b.sell - a.sell; });
    if (sort === 'name')       result = result.slice().sort(function(a,b){ return a.name.localeCompare(b.name); });
    return result;
  }

  /* ── BUILD ONE CARD ─────────────────────────── */
  function buildCard(p) {
    var cost = ((p.filament || 0) + (p.elec || 0)) / Math.max(p.qty || 1, 1);

    var img = p.image
      ? '<img src="' + p.image + '" alt="' + p.name.replace(/"/g,'&quot;') +
        '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
        '<div class="no-photo" style="display:none">📷</div>'
      : '<div class="no-photo">📷</div>';

    var notes = p.notes
      ? '<div class="product-notes">' + p.notes + '</div>'
      : '';

    var time = p.printTime
      ? '<div class="product-time">⏱ ' + p.printTime + 'h print time' +
        (p.qty > 1 ? ' · ' + p.qty + ' per plate' : '') + '</div>'
      : (p.qty > 1 ? '<div class="product-time">' + p.qty + ' per plate</div>' : '');

    return ''
      + '<div class="product">'
      +   '<div class="product-img" onclick="openLightbox(\'' + (p.image || '').replace(/'/g,"\\'") + '\')">'
      +     img
      +   '</div>'
      +   '<div class="product-body">'
      +     '<h2 class="product-name">' + p.name + '</h2>'
      +     notes
      +     time
      +     '<div class="data-label">Our Investment</div>'
      +     '<div class="stats-row">'
      +       '<div class="stat-cell"><span class="val">' + fmt(p.filament) + '</span><span class="label">Filament</span></div>'
      +       '<div class="stat-cell"><span class="val">' + fmt(p.elec) + '</span><span class="label">Elec + Wear</span></div>'
      +       '<div class="stat-cell accent"><span class="val">' + fmt(cost) + '</span><span class="label">Cost / Item</span></div>'
      +     '</div>'
      +     '<div class="data-label">Market Value</div>'
      +     '<div class="stats-row">'
      +       '<div class="stat-cell mkt-lo"><span class="val">' + fmt(p.mktLow) + '</span><span class="label">Low</span></div>'
      +       '<div class="stat-cell mkt-md"><span class="val">' + fmt(p.mktMid) + '</span><span class="label">Mid</span></div>'
      +       '<div class="stat-cell mkt-hi"><span class="val">' + fmt(p.mktHigh) + '</span><span class="label">High</span></div>'
      +     '</div>'
      +     '<div class="price-box">'
      +       '<div class="price-label">OUR PRICE</div>'
      +       '<div class="price-value">' + fmt(p.sell) + '</div>'
      +     '</div>'
      +   '</div>'
      + '</div>';
  }

  /* ── RENDER CATALOG ─────────────────────────── */
  function renderCatalog() {
    var products = getProducts();
    var grid = $('catalog');
    $('product-count').textContent = products.length;

    if (!PRODUCTS.length) {
      grid.innerHTML = '<div class="empty-catalog"><div class="ico">🖨️</div><p>No products yet — check back soon.</p></div>';
      return;
    }
    if (!products.length) {
      grid.innerHTML = '<div class="empty-catalog"><div class="ico">🔍</div><p>No products match your search.</p></div>';
      return;
    }
    grid.innerHTML = products.map(buildCard).join('');
  }

  /* ── LIGHTBOX ───────────────────────────────── */
  window.openLightbox = function(src) {
    if (!src) return;
    $('lb-img').src = src;
    $('lightbox').classList.add('open');
    $('scroll-wrap').style.overflow = 'hidden';
  };
  window.closeLightbox = function() {
    $('lightbox').classList.remove('open');
    $('scroll-wrap').style.overflow = '';
  };
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeLightbox();
  });

  /* ── INIT ───────────────────────────────────── */
  renderCatalog();
  $('search-input').addEventListener('input', renderCatalog);
  $('sort-select').addEventListener('change', renderCatalog);

})();
</script>
