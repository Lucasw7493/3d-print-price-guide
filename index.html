<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMOKYMTN 3D PRINTS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
/* ═════════════════════════════════════════════════════════════
   ██  PRODUCT DATA  ██
   
   This is the ONLY section you need to edit.
   
   HOW TO ADD A NEW PRODUCT:
   1. Copy the template at the bottom of this list
   2. Paste it before the closing ];
   3. Fill in your values
   4. Save your product photo to the /images folder
   5. Set "image" to "images/your-filename.jpg"
   6. Push to GitHub — done!
   
   HOW TO REMOVE A PRODUCT:
   Delete its entire { ... }, block
   
   HOW TO EDIT A PRODUCT:
   Just change the values and push to GitHub
   ═════════════════════════════════════════════════════════════ */

var PRODUCTS = [

  {
    name:      "Ironbite Dragon",
    image:     "ironbite.jpg",     // 4-color multicolor articulated dragon
    filament:  0.77,                      // $3.85 plate cost / 5 per plate = $0.77 each
    elec:      0.20,                      // ~$0.20 electricity + wear per unit (9h18m / 5)
    qty:       5,                         // 5 per plate
    printTime: 9.3,                       // 9h 18m total plate time
    mktLow:    10.00,                     // small multicolor articulated dragons
    mktMid:    18.00,                     // mid range on Etsy/local
    mktHigh:   28.00,                     // premium multicolor, detailed
    sell:      15.00,                     // competitive local price
    notes:     "4-color PLA — Articulated, multicolor print-in-place. 5 per plate. Great seller."
  },

  {
    name:      "Bat Shadow",
    image:     "batshadow.webp",   // Shadow x Batman mashup statue
    filament:  9.21,                      // $9.21 total filament (6 colors, 424g)
    elec:      3.50,                      // ~$3.50 electricity + wear (27+ hours across 8 plates)
    qty:       1,                         // 1 per build (8 plates assembled)
    printTime: 27.6,                      // 1 day 3h 38m total
    mktLow:    45.00,                     // large detailed multicolor figurines
    mktMid:    65.00,                     // 11" tall, 6-color, assembled statue
    mktHigh:   90.00,                     // premium custom multicolor statues
    sell:      55.00,                     // strong local price, great margin
    notes:     "6-color PLA — Shadow x Batman mashup, 11\" tall, 8-plate assembly. Premium piece."
  }

  /* ─────────────────────────────────────────────────
     TEMPLATE — Copy this to add a new product:

  ,{
    name:      "",
    image:     "images/",
    filament:  0.00,
    elec:      0.00,
    qty:       1,
    printTime: 0,
    mktLow:    0.00,
    mktMid:    0.00,
    mktHigh:   0.00,
    sell:      0.00,
    notes:     ""
  }

  ───────────────────────────────────────────────── */

];
</script>

<!-- ════════════════════════════════════════════════
     You don't need to edit anything below this line.
     ════════════════════════════════════════════════ -->

<div class="neon-line"></div>

<header class="site-header">
  <div class="brand-row">
    <div class="brand-icon">
      <div class="p-gantry"></div>
      <div class="p-nozzle"></div>
      <div class="p-print"></div>
      <div class="p-frame"></div>
      <div class="p-bed"></div>
      <div class="p-led"></div>
    </div>
    <h1 class="brand-name">SMOKYMTN 3D PRINTS</h1>
  </div>
  <p class="brand-tagline">CUSTOM 3D PRINTED GOODS ◆ LOCAL PICKUP</p>
  <p class="brand-contact">
    DM to order · Custom colors &amp; sizes available
  </p>
</header>

<div class="catalog-meta">
  <span><span class="hl" id="product-count">0</span> PRODUCTS</span>
  <span>◆</span>
  <span>LOCAL PICKUP ONLY</span>
</div>

<div class="catalog" id="catalog"></div>

<footer class="site-footer">
  <span>SMOKYMTN 3D PRINTS</span><br>
  Local pickup · Custom orders welcome<br>
  © 2026
</footer>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="Product photo">
</div>

<script>
/* ═══════════════════════════════════════════════════
   RENDER ENGINE — builds cards from PRODUCTS array
   ═══════════════════════════════════════════════════ */
(function() {

  var $ = function(id) { return document.getElementById(id); };
  var fmt = function(n) { return '$' + Number(n).toFixed(2); };

  function buildCatalog() {
    var grid = $('catalog');
    $('product-count').textContent = PRODUCTS.length;

    if (!PRODUCTS.length) {
      grid.innerHTML = '<div class="empty-catalog"><div class="ico">🖨️</div><p>No products yet — check back soon.</p></div>';
      return;
    }

    grid.innerHTML = PRODUCTS.map(function(p, i) {
      var cost = ((p.filament || 0) + (p.elec || 0)) / Math.max(p.qty || 1, 1);

      var img = p.image
        ? '<img src="' + p.image + '" alt="' + p.name.replace(/"/g,'&quot;') + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
          + '<div class="no-photo" style="display:none">📷</div>'
        : '<div class="no-photo">📷</div>';

      var notes = p.notes
        ? '<div class="product-notes">' + p.notes + '</div>'
        : '';

      var time = p.printTime
        ? '<div class="product-time">⏱ ' + p.printTime + 'h print time' + (p.qty > 1 ? ' · ' + p.qty + ' per plate' : '') + '</div>'
        : (p.qty > 1 ? '<div class="product-time">' + p.qty + ' per plate</div>' : '');

      return ''
        + '<div class="product" style="animation-delay:' + (i * .07) + 's">'
        +   '<div class="product-img" onclick="openLightbox(\'' + (p.image || '').replace(/'/g,"\\'") + '\')">'
        +     img
        +   '</div>'
        +   '<div class="product-body">'
        +     '<h2 class="product-name">' + p.name + '</h2>'
        +     notes
        +     time

        +     '<div class="data-label">Our Investment</div>'
        +     '<div class="stats-row">'
        +       '<div class="stat-cell"><span class="val">' + fmt(p.filament) + '</span><span class="label">Filament</span></div>'
        +       '<div class="stat-cell"><span class="val">' + fmt(p.elec) + '</span><span class="label">Elec + Wear</span></div>'
        +       '<div class="stat-cell accent"><span class="val">' + fmt(cost) + '</span><span class="label">Cost / Item</span></div>'
        +     '</div>'

        +     '<div class="data-label">Market Value</div>'
        +     '<div class="stats-row">'
        +       '<div class="stat-cell mkt-lo"><span class="val">' + fmt(p.mktLow) + '</span><span class="label">Low</span></div>'
        +       '<div class="stat-cell mkt-md"><span class="val">' + fmt(p.mktMid) + '</span><span class="label">Mid</span></div>'
        +       '<div class="stat-cell mkt-hi"><span class="val">' + fmt(p.mktHigh) + '</span><span class="label">High</span></div>'
        +     '</div>'

        +     '<div class="price-box">'
        +       '<div class="price-label">OUR PRICE</div>'
        +       '<div class="price-value">' + fmt(p.sell) + '</div>'
        +     '</div>'

        +   '</div>'
        + '</div>';
    }).join('');
  }

  /* ── LIGHTBOX ───────────────────────── */
  window.openLightbox = function(src) {
    if (!src) return;
    $('lb-img').src = src;
    $('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  window.closeLightbox = function() {
    $('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  };
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeLightbox();
  });

  /* ── GO ─────────────────────────────── */
  buildCatalog();

})();
</script>

</body>
</html>
